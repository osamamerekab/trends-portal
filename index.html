<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trends Subscriptions | Management</title>

  <!-- Supabase JS (v2) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- SheetJS (Export only) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary: #4f46e5; --primary-hover: #4338ca; --bg: #f8fafc;
      --text: #1e293b; --danger: #ef4444; --success: #10b981;
      --renew: #8b5cf6; --border: #e2e8f0;
      --bg-gradient: radial-gradient(circle at top right, #1e293b, #0f172a);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); }

    #login-page { height: 100vh; display:flex; align-items:center; justify-content:center; background: var(--bg-gradient); }
    .login-card {
      background: white; padding: 50px 40px; border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      width: 100%; max-width: 420px; text-align:center;
    }
    .logo-fallback {
      width: 70px; height: 70px; background: var(--primary); border-radius: 18px;
      margin: 0 auto 15px; display:flex; align-items:center; justify-content:center;
      color:white; font-size:32px; font-weight:800;
    }
    .login-input {
      width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9;
      background: #f8fafc; font-size: 1rem; text-align:center;
      box-sizing: border-box; transition: 0.3s; margin-bottom: 15px;
    }
    .login-input:focus { border-color: var(--primary); outline:none; background:#fff; }
    .btn-login {
      width: 100%; padding: 16px; margin-top: 10px; background: var(--primary);
      color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer;
    }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
    .error-shake { animation: shake 0.3s ease-in-out; border-color: var(--danger) !important; }

    #main-app { display:none; }
    header {
      background:white; padding: 0 5%; height:70px; display:flex;
      justify-content:space-between; align-items:center;
      border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
    }
    .logo-text { font-size:1.4rem; font-weight:800; color:var(--primary); text-transform:uppercase; }
    .user-welcome { font-size:0.9rem; font-weight:600; color:#64748b; background:#f1f5f9; padding:8px 15px; border-radius:10px; }

    .nav-container { padding:20px 5% 0; display:flex; gap:20px; border-bottom:1px solid var(--border); background:white; }
    .nav-tab { padding:10px 20px; cursor:pointer; font-weight:600; color:#64748b; border-bottom:3px solid transparent; transition:0.2s; }
    .nav-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

    .container { padding:30px 5%; max-width:1400px; margin:auto; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px; }
    .stat-box { background:white; padding:20px; border-radius:12px; border:1px solid var(--border); cursor:pointer; transition:0.2s; }
    .stat-box.active { border:2px solid var(--primary); background:#f5f3ff; }

    .filter-bar {
      background:white; padding:15px 20px; border-radius:12px; border:1px solid var(--border);
      margin-bottom:20px; display:flex; gap:15px; flex-wrap:wrap;
    }
    .filter-bar input, .filter-bar select { padding:10px; border:1px solid var(--border); border-radius:8px; }

    .table-card { background:white; border-radius:16px; border:1px solid var(--border); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th { background:#f1f5f9; padding:16px 20px; font-size:0.75rem; text-transform:uppercase; color:#475569; text-align:left; }
    td { padding:14px 20px; border-bottom:1px solid #f1f5f9; font-size:0.9rem; }

    .service-link { color:var(--primary); cursor:pointer; font-weight:700; }
    .alert-row { background-color:#fff1f2 !important; border-left:4px solid var(--danger); }
    .badge { padding:4px 10px; border-radius:20px; font-weight:700; font-size:0.7rem; }
    .badge-urgent { background:#fee2e2; color:#b91c1c; }
    .badge-safe { background:#dcfce7; color:#166534; }

    .btn { padding:10px 18px; border-radius:8px; border:none; cursor:pointer; font-weight:600; font-size:0.85rem; }
    .btn-main { background:var(--primary); color:white; }
    .btn-success { background:var(--success); color:white; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:100; backdrop-filter: blur(2px); }
    .modal { background:white; padding:30px; border-radius:16px; width:520px; max-height:90vh; overflow-y:auto; }
    .modal label { font-size:0.75rem; font-weight:700; color:#64748b; margin-top:15px; display:block; text-transform:uppercase; }
    .modal input, .modal select, .modal textarea { width:100%; padding:12px; margin-top:5px; border:1px solid var(--border); border-radius:8px; box-sizing:border-box; }

    .hint { margin-top:12px; color:#64748b; font-size:0.85rem; }
    .status { margin-top:10px; color:#94a3b8; font-size:0.8rem; min-height: 18px; }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <div id="login-page">
    <div class="login-card" id="loginCard">
      <div class="logo-fallback">T</div>
      <h1>Portal Access</h1>

      <input type="text" id="emailInput" class="login-input" placeholder="Email" autocomplete="username" />
      <input type="password" id="passInput" class="login-input" placeholder="Password" autocomplete="current-password"
             onkeypress="if(event.key==='Enter') signIn()" />
      <button class="btn-login" onclick="signIn()">Sign In</button>

      <div class="hint">Use your company email + password.</div>
      <div id="statusLine" class="status"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="main-app">
    <header>
      <div class="logo-text">Trends Subscriptions</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div id="userWelcome" class="user-welcome">Welcome</div>
        <button class="btn btn-main" onclick="openAddModal()">+ New Entry</button>
        <button class="btn btn-success" onclick="exportToExcel()">↓ Export Excel</button>
        <button class="btn" style="background:#f1f5f9; color:#475569" onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="nav-container">
      <div id="tab-subs" class="nav-tab active" onclick="switchTab('subs')">Subscriptions</div>
      <div id="tab-audit" class="nav-tab" onclick="switchTab('audit')">Audit Logs</div>
    </div>

    <div class="container" id="container-subs">
      <div class="stats-grid">
        <div id="box-all" class="stat-box active" onclick="toggleUrgent(false)">
          <small>Matching Results</small>
          <div id="stat-filtered-count">0</div>
        </div>
        <div id="box-urgent" class="stat-box" style="border-left: 5px solid var(--danger);" onclick="toggleUrgent(true)">
          <small>Urgent Actions</small>
          <div id="stat-urgent" style="color:var(--danger)">0</div>
        </div>
      </div>

      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search service..." onkeyup="loadTable()" style="flex:2;">
        <select id="filterCycle" onchange="loadTable()">
          <option value="All">All Cycles</option>
          <option value="Monthly">Monthly</option>
          <option value="Yearly">Yearly</option>
        </select>
        <select id="filterMethod" onchange="loadTable()">
          <option value="All">All Methods</option>
          <option value="Vendor">Vendor</option>
          <option value="Website">Website</option>
          <option value="Contract">Contract</option>
        </select>
        <button class="btn" style="background:#f1f5f9" onclick="resetFilters()">Reset</button>
        <button id="admin-wipe-btn" class="btn" style="color:var(--danger); background:#fee2e2" onclick="wipeAllData()">Wipe All</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Service Name</th><th>Dept / Users</th><th>Expiry</th><th>Cost</th><th>Cycle</th><th>Method</th><th>Status</th><th style="text-align:right">Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="container" id="container-audit" style="display:none;">
      <h3>System History</h3>
      <div id="auditBody" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="entry-modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Subscription Entry</h2>
      <input type="hidden" id="edit-id">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div><label>Service Name</label><input type="text" id="name"></div>
        <div><label>Dept / Users</label><input type="text" id="dept"></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div><label>Expiry Date</label><input type="date" id="date"></div>
        <div><label>Cost</label><input type="text" id="cost" placeholder="e.g. 100 AED or $50"></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div><label>Cycle</label>
          <select id="cycle"><option value="Monthly">Monthly</option><option value="Yearly">Yearly</option></select>
        </div>
        <div><label>Method</label>
          <select id="method"><option value="Vendor">Vendor</option><option value="Website">Website</option><option value="Contract">Contract</option></select>
        </div>
      </div>
      <label>Notes</label><textarea id="notes" rows="4"></textarea>
      <div style="display:flex; gap:10px; margin-top:25px">
        <button class="btn btn-main" style="flex:2" onclick="saveData()">Save Changes</button>
        <button id="delBtn" class="btn" style="color:var(--danger); background:#fee2e2" onclick="deleteCurrent()">Delete</button>
        <button class="btn" style="background:#f1f5f9" onclick="hideModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ========= Supabase =========
    const SUPABASE_URL = "https://qiqvguatvmrwqeqvsmua.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpcXZndWF0dm1yd3FlcXZzbXVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMTQ1MDQsImV4cCI6MjA4NzU5MDUwNH0.NRWuuy__j1Flblk55uDsKe7DSIpyxzTNqcW3cN_Tybt4".replace("TNqc", "TNqc"); // no-op; keeps line from being auto-wrapped oddly
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

    let showUrgentOnly = false;
    let currentUser = null; // { id, email, username, role }
    let subsCache = [];

    function setStatus(msg) { const el = document.getElementById("statusLine"); if (el) el.textContent = msg || ""; }
    function shake() {
      const card = document.getElementById('loginCard');
      card.classList.add('error-shake');
      setTimeout(() => card.classList.remove('error-shake'), 400);
    }

    function formatDate(d) {
      if (!d) return "";
      const dt = new Date(d);
      return `${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;
    }

    async function signIn() {
      try {
        setStatus("Signing in…");
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passInput').value;

        if (!email || !password) { setStatus(""); shake(); return; }

        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email, password });
        if (authError || !authData?.user) {
          setStatus("Wrong email or password.");
          shake();
          return;
        }

        setStatus("Loading profile…");
        const { data: profile, error: profErr } = await sb
          .from('profiles')
          .select('id,email,username,role')
          .eq('id', authData.user.id)
          .single();

        if (profErr || !profile) {
          setStatus("");
          alert("Login worked, but your profile row is missing. In Supabase → Table Editor → profiles, add a row where id = this user's UUID.");
          await sb.auth.signOut();
          return;
        }

        currentUser = {
          id: authData.user.id,
          email: profile.email,
          username: profile.username,
          role: profile.role || 'Staff'
        };

        setStatus("");
        showApp();
      } catch (e) {
        setStatus("");
        alert("Login failed: " + (e?.message || e));
      }
    }

    async function logout() {
      await sb.auth.signOut();
      currentUser = null;
      subsCache = [];
      document.getElementById('main-app').style.display = 'none';
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('passInput').value = "";
      setStatus("");
    }

    function showApp() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      document.getElementById('userWelcome').innerText = `Logged in: ${currentUser.username}`;

      if (currentUser.role !== 'Admin') {
        const wipe = document.getElementById('admin-wipe-btn');
        if (wipe) wipe.style.display = 'none';
      }

      refreshSubscriptions();
    }

    // Auto-login
    (async function boot() {
      try {
        const { data } = await sb.auth.getSession();
        const session = data?.session;
        if (!session) return;

        const { data: profile } = await sb
          .from('profiles')
          .select('id,email,username,role')
          .eq('id', session.user.id)
          .single();

        if (!profile) return;

        currentUser = {
          id: session.user.id,
          email: profile.email,
          username: profile.username,
          role: profile.role || 'Staff'
        };

        showApp();
      } catch {}
    })();

    // ========= Data =========
    async function refreshSubscriptions() {
      const { data, error } = await sb
        .from('subscriptions')
        .select('*')
        .order('expiry_date', { ascending: true });

      if (error) { alert("Failed to load subscriptions: " + error.message); return; }
      subsCache = data || [];
      loadTable();
    }

    function loadTable() {
      const body = document.getElementById('tableBody');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cyc = document.getElementById('filterCycle').value;
      const meth = document.getElementById('filterMethod').value;

      body.innerHTML = '';
      const today = new Date(); today.setHours(0,0,0,0);

      let urgentCount = 0, visibleCount = 0;
      const sorted = [...subsCache].sort((a,b) => new Date(a.expiry_date) - new Date(b.expiry_date));

      sorted.forEach((s) => {
        const diff = Math.ceil((new Date(s.expiry_date) - today) / 86400000);
        const isU = (s.cycle === 'Monthly' && diff <= 5) || (s.cycle === 'Yearly' && diff <= 21);
        if (isU) urgentCount++;

        const name = (s.name || '').toLowerCase();
        const dept = (s.dept_users || '').toLowerCase();

        if ((name.includes(search) || dept.includes(search)) &&
            (cyc === 'All' || s.cycle === cyc) &&
            (meth === 'All' || s.method === meth) &&
            (!showUrgentOnly || isU)) {

          visibleCount++;
          body.innerHTML += `<tr class="${isU ? 'alert-row' : ''}">
            <td><span class="service-link" onclick="editSub('${s.id}')">${s.name}</span></td>
            <td>${s.dept_users || ''}</td>
            <td>${formatDate(s.expiry_date)}</td>
            <td>${s.cost || ''}</td>
            <td>${s.cycle || ''}</td>
            <td>${s.method || ''}</td>
            <td><span class="badge ${isU ? 'badge-urgent' : 'badge-safe'}">${isU ? 'RENEW NOW' : 'ACTIVE'}</span></td>
            <td style="text-align:right"><button class="btn" style="background:var(--renew);color:white" onclick="quickRenew('${s.id}')">🔄 Renew</button></td>
          </tr>`;
        }
      });

      document.getElementById('stat-filtered-count').innerText = visibleCount;
      document.getElementById('stat-urgent').innerText = urgentCount;
    }

    async function saveData() {
      const id = document.getElementById('edit-id').value;
      const sub = {
        name: document.getElementById('name').value,
        dept_users: document.getElementById('dept').value,
        expiry_date: document.getElementById('date').value || null,
        cost: document.getElementById('cost').value,
        cycle: document.getElementById('cycle').value,
        method: document.getElementById('method').value,
        notes: document.getElementById('notes').value
      };
      if (!sub.name) return alert("Service Name is required");

      if (id === "-1") {
        const { error } = await sb.from('subscriptions').insert([{ ...sub, created_by: currentUser.id }]);
        if (error) return alert("Save failed: " + error.message);
      } else {
        const { error } = await sb.from('subscriptions').update(sub).eq('id', id);
        if (error) return alert("Update failed: " + error.message);
      }
      hideModal();
      await refreshSubscriptions();
    }

    async function quickRenew(id) {
      const s = subsCache.find(x => x.id === id);
      if (!s) return;

      let date = new Date(s.expiry_date);
      if (s.cycle === "Monthly") date.setMonth(date.getMonth() + 1);
      else date.setFullYear(date.getFullYear() + 1);

      const newDate = date.toISOString().split('T')[0];
      const { error } = await sb.from('subscriptions').update({ expiry_date: newDate }).eq('id', id);
      if (error) return alert("Renew failed: " + error.message);
      await refreshSubscriptions();
    }

    async function deleteCurrent() {
      if (currentUser.role !== 'Admin') return alert("Permission Denied");
      const id = document.getElementById('edit-id').value;
      if (!id || id === "-1") return;

      const { error } = await sb.from('subscriptions').delete().eq('id', id);
      if (error) return alert("Delete failed: " + error.message);

      hideModal();
      await refreshSubscriptions();
    }

    async function wipeAllData() {
      if (currentUser.role !== 'Admin') return alert("Permission Denied");
      if (!confirm("Wipe all data? This cannot be undone.")) return;

      const { error } = await sb.from('subscriptions').delete().gt('created_at', '1900-01-01');
      if (error) return alert("Wipe failed: " + error.message);
      await refreshSubscriptions();
    }

    // ========= UI =========
    function switchTab(t) {
      ['subs', 'audit'].forEach(id => document.getElementById(`container-${id}`).style.display = 'none');
      ['tab-subs', 'tab-audit'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById(`container-${t}`).style.display = 'block';
      document.getElementById(`tab-${t}`).classList.add('active');
      if (t === 'audit') loadAudit();
    }

    function hideModal() { document.getElementById('entry-modal').style.display = 'none'; }
    function openAddModal() {
      document.getElementById('edit-id').value = "-1";
      ['name','dept','date','cost','notes'].forEach(id => document.getElementById(id).value = "");
      document.getElementById('cycle').value = "Monthly";
      document.getElementById('method').value = "Website";
      document.getElementById('delBtn').style.display = 'none';
      document.getElementById('entry-modal').style.display = 'flex';
    }

    function editSub(id) {
      const s = subsCache.find(x => x.id === id);
      if (!s) return;

      document.getElementById('edit-id').value = s.id;
      document.getElementById('name').value = s.name || "";
      document.getElementById('dept').value = s.dept_users || "";
      document.getElementById('date').value = s.expiry_date || "";
      document.getElementById('cost').value = s.cost || "";
      document.getElementById('cycle').value = s.cycle || "Monthly";
      document.getElementById('method').value = s.method || "Website";
      document.getElementById('notes').value = s.notes || "";

      document.getElementById('delBtn').style.display = (currentUser.role === 'Admin' ? 'block' : 'none');
      document.getElementById('entry-modal').style.display = 'flex';
    }

    function toggleUrgent(v) { showUrgentOnly = v; loadTable(); }
    function resetFilters() {
      document.getElementById('filterCycle').value = "All";
      document.getElementById('filterMethod').value = "All";
      document.getElementById('searchInput').value = "";
      loadTable();
    }

    function loadAudit() {
      document.getElementById('auditBody').innerHTML =
        `<div class="stat-box">Audit logs will be moved to the database next.</div>`;
    }

    function exportToExcel() {
      const data = (subsCache || []).map(s => ({
        "Service Name": s.name,
        "Dept / Users": s.dept_users,
        "Expiry Date": s.expiry_date,
        "Cost": s.cost,
        "Cycle": s.cycle,
        "Method": s.method,
        "Notes": s.notes
      }));
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Subscriptions");
      XLSX.writeFile(wb, "Trends_Subscriptions.xlsx");
    }

    // Expose handlers
    window.signIn = signIn;
    window.logout = logout;
    window.switchTab = switchTab;
    window.loadTable = loadTable;
    window.saveData = saveData;
    window.quickRenew = quickRenew;
    window.deleteCurrent = deleteCurrent;
    window.hideModal = hideModal;
    window.openAddModal = openAddModal;
    window.toggleUrgent = toggleUrgent;
    window.resetFilters = resetFilters;
    window.editSub = editSub;
    window.wipeAllData = wipeAllData;
    window.exportToExcel = exportToExcel;
  </script>
</body>
</html>
